<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CND v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Title -->
    <title>Danh sách các mặt hàng</title>

    <!-- Style -->
    <link rel="stylesheet" href="assets/css/core.css" />
  </head>

  <body>
    <header class="shadow" id="navigateBar">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <!-- Sidebar toggle -->
          <button
            class="btn"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#sidebar"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Brand nav -->
          <a class="navbar-brand" href="#">Saleman</a>

          <!-- Header toggle for small screen -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <form class="d-flex ms-auto" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <!-- Side bar -->
    <div class="container-fluid p-0 d-flex">
      <div class="d-flex flex-column vh-100 bg-white">
        <ul class="nav nav-pills flex-column">
          <li class="nav-item">
            <a href="#" class="nav-link py-2 border-bottom rounded-0 text-black">
              <i class="bi bi-graph-up mx-1" style="color: green"></i>
              <span>Báo cáo</span>
            </a>
          </li>

          <li class="nav-item active">
            <a href="#" class="nav-link active py-2 border-bottom">
              <i class="bi bi-bag-fill mx-1" style="color: #ff3e9b"></i>
              <span>Mặt hàng</span>
            </a>
          </li>

          <li class="nav-item">
            <a href="" class="nav-link py-2 border-bottom rounded-0 text-black">
              <i class="bi bi-box-fill mx-1" style="color: #d4c9b2"></i>
              <span>Quản lý hàng tồn kho</span>
            </a>
          </li>

          <li class="nav-item">
            <a href="" class="nav-link py-2 border-bottom rounded-0 text-black">
              <i class="bi bi-person-vcard mx-1" style="color: blue"></i>
              <span>Nhân viên</span></a
            >
          </li>

          <li class="nav-item">
            <a href="" class="nav-link py-2 border-bottom rounded-0 text-black">
              <i
                class="bi bi-people-fill mx-1"
                style="color: palevioletred"
              ></i>
              <span>Khách hàng</span>
            </a>
          </li>

          <li class="nav-item">
            <a href="" class="nav-link py-2 border-bottom rounded-0 text-black">
              <i class="bi bi-puzzle-fill mx-1" style="color: burlywood"></i>
              <span>Tích hợp</span>
            </a>
          </li>

          <li class="nav-item">
            <a href="" class="nav-link py-2 border-bottom rounded-0 text-black">
              <i class="bi bi-gear-fill mx-1" style="color: silver"></i>
              <span>Cài đặt</span>
            </a>
          </li>

          <li class="nav-item">
            <a href="" class="nav-link py-2 border-bottom rounded-0 text-black">
              <i
                class="bi bi-question-circle-fill mx-1"
                style="color: darkblue"
              ></i>
              <span>Trợ giúp</span>
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Main Content -->
    <main class="rounded"></main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
